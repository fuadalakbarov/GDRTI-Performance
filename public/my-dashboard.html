<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mənim Panelim — GDRTI Performans</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app">
  <div class="sidebar"></div>

  <div class="main">
    <div class="topbar">
      <div>
        <h1 id="greet"></h1>
        <div class="subtitle">Tapşırıqlarınız və performans göstəriciləriniz</div>
      </div>
      <div id="assignTaskBtnWrap" style="display:none;">
        <button class="btn small" onclick="openAssignModal()">📋 Tapşırıq ver</button>
      </div>
    </div>

    <!-- Tapşırıq vermə modalı (müdir/müavin/sektor müdiri üçün) -->
    <div class="modal-bg" id="assignModal" style="display:none;">
      <div class="modal" style="max-width:440px;">
        <h3>📋 Tapşırıq ver</h3>
        <form id="assignForm">
          <div class="field"><label>İşçi</label><select id="aEmp" required></select></div>
          <div class="field"><label>Tapşırıq</label><input type="text" id="aTitle" required></div>
          <div class="field"><label>Təsvir</label><textarea id="aDesc" rows="2"></textarea></div>
          <div class="field"><label>Son tarix</label><input type="date" id="aDue"></div>
          <div class="field"><label>Prioritet</label>
            <select id="aPrio">
              <option value="medium">🟡 Orta</option>
              <option value="high">🔴 Yüksək</option>
              <option value="low">🟢 Aşağı</option>
            </select>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn secondary" onclick="document.getElementById('assignModal').style.display='none'">Ləğv et</button>
            <button type="submit" class="btn">Göndər</button>
          </div>
          <div class="error-msg" id="aErr"></div>
        </form>
      </div>
    </div>

    <div id="pendingBanner" style="display:none; background:#fef3e2; border:1px solid #fde3b0; color:#92600a; border-radius:14px; padding:14px 18px; margin-bottom:20px; font-size:.88rem;">
      ⏳ Hesabınız yaradılıb, amma hələ heç bir sektora təyin olunmayıbsınız. Admin sizi tezliklə təyin edəcək.
    </div>

    <!-- Ayın işçisi -->
    <div id="eomWidget" style="display:none;background:linear-gradient(135deg,#fffbeb,#fef3c7);border:1px solid #f0c040;border-radius:14px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:14px;">
      <div style="font-size:1.8rem;">🏆</div>
      <div id="eomAvatar" style="width:48px;height:48px;border-radius:50%;background:var(--grad);color:#fff;font-size:.9rem;font-weight:700;display:flex;align-items:center;justify-content:center;overflow:hidden;border:3px solid #f59e0b;flex-shrink:0;"></div>
      <div>
        <div style="font-size:.7rem;font-weight:700;color:#d97706;text-transform:uppercase;letter-spacing:1px;">⭐ Bu Ayın İşçisi</div>
        <div id="eomNameW" style="font-size:1rem;font-weight:800;color:var(--text);"></div>
        <div id="eomNoteW" style="font-size:.78rem;color:var(--text-dim);"></div>
      </div>
    </div>

    <div class="stat-cards-new">
      <div class="stat-card-new" data-icon="⭐" style="animation-delay:.05s">
        <div class="scn-icon" style="background:#f0eefa;color:#6366f1;">⭐</div>
        <div class="scn-n" id="statPoints">0</div>
        <div class="scn-l">Ümumi bal</div>
      </div>
      <div class="stat-card-new" data-icon="📈" style="animation-delay:.1s">
        <div class="scn-icon" style="background:#dbeafe;color:#2563eb;">📈</div>
        <div class="scn-n" id="statCompletion">0%</div>
        <div class="scn-l">Tamamlama</div>
      </div>
      <div class="stat-card-new" data-icon="✅" style="animation-delay:.15s">
        <div class="scn-icon" style="background:#d1fae5;color:#16a34a;">✅</div>
        <div class="scn-n" id="statCompleted">0</div>
        <div class="scn-l">Tamamlanmış</div>
      </div>
      <div class="stat-card-new" data-icon="⏰" style="animation-delay:.2s">
        <div class="scn-icon" style="background:#fee2e2;color:#dc2626;">⏰</div>
        <div class="scn-n" id="statOverdue">0</div>
        <div class="scn-l">Gecikmiş</div>
      </div>
    </div>

    <h2 style="font-size:1rem;font-weight:800;margin-bottom:14px;color:#1e1a3c;letter-spacing:-.02em;">Tapşırıqlarım</h2>
    <div id="taskList"></div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
const user = requireAuth();
if (['admin','director','deputy'].includes(user.role)) location.href = '/admin.html';
document.getElementById('greet').textContent = `Salam, ${user.full_name.split(' ')[0]}`;
if (!user.sector_id) document.getElementById('pendingBanner').style.display = 'block';

async function load(){
  const tasks = await apiCall('/tasks/mine');
  const completed = tasks.filter(t=>t.status==='completed');
  const overdue = tasks.filter(t=>t.status==='overdue');
  const completionRate = tasks.length ? Math.round(completed.length/tasks.length*100) : 0;
  let points = 0;
  completed.forEach(t=>{
    const onTime = !t.due_date || !t.completed_at || new Date(t.completed_at) <= new Date(t.due_date+'T23:59:59');
    let base = onTime ? 10 : 6;
    if (t.quality_score != null) base = base * (t.quality_score/100);
    points += base;
  });
  points -= overdue.length * 3;
  points = Math.max(0, Math.round(points));

  document.getElementById('statPoints').textContent = points;
  document.getElementById('statCompletion').textContent = completionRate + '%';
  document.getElementById('statCompleted').textContent = completed.length;
  document.getElementById('statOverdue').textContent = overdue.length;

  const PRIO_LABELS = { high:'🔴 Yüksək', medium:'🟡 Orta', low:'🟢 Aşağı' };
  const PRIO_CLASS  = { high:'prio-high', medium:'prio-medium', low:'prio-low' };

  list.innerHTML = tasks.map((t, idx) => {
    let dueClass = 'task-due', dueLabel = '';
    if (t.due_date) {
      dueLabel = t.due_date;
      if (t.status !== 'completed' && t.status !== 'cancelled') {
        if (t.due_date < todayStr) { dueClass += ' overdue'; dueLabel = '⚠️ ' + dueLabel; }
        else if (t.due_date === todayStr) { dueClass += ' today'; dueLabel = '⏰ Bu gün'; }
      }
    }
    return `
    <div class="task-card" style="animation-delay:${idx*0.06}s">
      <div class="task-card-header">
        <div class="task-card-title">${t.title}</div>
        <span class="badge ${t.status}">${STATUS_LABELS[t.status]}</span>
      </div>
      ${t.description ? `<div class="task-card-body">${t.description}</div>` : ''}
      <div class="task-card-footer">
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
          ${t.priority ? `<span class="task-prio ${PRIO_CLASS[t.priority]||'prio-medium'}">${PRIO_LABELS[t.priority]||''}</span>` : ''}
          ${dueLabel ? `<span class="${dueClass}">${dueLabel}</span>` : ''}
        </div>
        <select class="status-select" onchange="updateStatus('${t.id}', this.value)">
          <option value="pending"     ${t.status==='pending'    ?'selected':''}>⏳ Gözləyir</option>
          <option value="in_progress" ${t.status==='in_progress'?'selected':''}>🔵 İcrada</option>
          <option value="completed"   ${t.status==='completed'  ?'selected':''}>✅ Tamamlandı</option>
        </select>
      </div>
    </div>`;
  }).join('') || '<div class="empty-state">Hələ tapşırıq yoxdur</div>';
}

async function updateStatus(id, status){
  try { await apiCall(`/tasks/${id}/status`, 'PATCH', { status }); load(); }
  catch(err){ alert(err.message); }
}

load();
apiCall('/settings/employee-of-month').then(eom=>{
  if (!eom||!eom.employee) return;
  document.getElementById('eomWidget').style.display='flex';
  const av=document.getElementById('eomAvatar');
  av.innerHTML=eom.employee.photo_url?`<img src="${eom.employee.photo_url}" style="width:100%;height:100%;object-fit:cover;">`:`<span>${initials(eom.employee.full_name)}</span>`;
  document.getElementById('eomNameW').textContent=eom.employee.full_name;
  document.getElementById('eomNoteW').textContent=eom.note||eom.employee.position||'';
}).catch(()=>{});

// Tapşırıq vermə düyməsi (müdir/müavin/sektor müdiri)
const CAN_ASSIGN = ['admin','director','deputy','sector_head'];
if (CAN_ASSIGN.includes(user.role)) {
  document.getElementById('assignTaskBtnWrap').style.display = 'block';
  apiCall('/employees/contacts').then(contacts => {
    const sel = document.getElementById('aEmp');
    contacts.forEach(c => sel.innerHTML += `<option value="${c.id}">${c.full_name}</option>`);
  }).catch(()=>{});
}
function openAssignModal(){ document.getElementById('assignModal').style.display='flex'; }
document.getElementById('assignForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('aErr'); errEl.textContent='';
  try {
    await apiCall('/tasks','POST',{
      employee_id: document.getElementById('aEmp').value,
      title: document.getElementById('aTitle').value.trim(),
      description: document.getElementById('aDesc').value.trim(),
      due_date: document.getElementById('aDue').value || null,
      priority: document.getElementById('aPrio').value
    });
    document.getElementById('assignModal').style.display='none';
    document.getElementById('assignForm').reset();
  } catch(err){ errEl.textContent=err.message; }
});
</script>
<script src="/js/sidebar.js"></script>
<script src="/js/chat-widget.js"></script>
<script src="/js/animate.js"></script>
</body>
</html>
