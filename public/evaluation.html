<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qiymətləndirmə — GDRTI Performans</title>
<link rel="stylesheet" href="/css/style.css">
<style>
/* Əsas layout */
.ev-wrap{display:grid;grid-template-columns:300px 1fr;gap:20px;align-items:start;}
.ev-list-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
.ev-list-head{background:var(--grad);color:#fff;padding:14px 18px;font-weight:700;font-size:.9rem;display:flex;justify-content:space-between;align-items:center;}
.ev-item{padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s;}
.ev-item:hover{background:#f5f6ff;}
.ev-item.active{background:#f0eefa;border-left:3px solid var(--indigo);}
.ev-item .emp{font-weight:700;font-size:.88rem;}
.ev-item .meta{font-size:.74rem;color:var(--text-dim);margin-top:3px;}

/* Qiymət rengi */
.grade-badge{padding:2px 10px;border-radius:20px;font-size:.75rem;font-weight:700;display:inline-block;}
.g5{background:#d1fae5;color:#065f46;}
.g4{background:#dbeafe;color:#1e40af;}
.g3{background:#fef3c7;color:#92400e;}
.g2{background:#fee2e2;color:#991b1b;}
.g0{background:#f3f4f6;color:#6b7280;}

/* Forma bölmələri */
.ev-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow);}
.ev-section-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--border);}
.ev-section-title h3{font-size:1rem;font-weight:800;display:flex;align-items:center;gap:8px;}
.weight-badge{background:var(--grad);color:#fff;border-radius:20px;padding:3px 12px;font-size:.78rem;font-weight:700;}

/* Tapşırıq / Meyar sətri */
.ev-row{display:grid;grid-template-columns:1fr 80px 120px;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0;}
.ev-row:last-child{border:none;}
.ev-row .title{font-size:.88rem;font-weight:600;}
.ev-row .sub{font-size:.74rem;color:var(--text-dim);margin-top:2px;}
.ev-row .pct{font-size:.8rem;font-weight:700;color:var(--indigo);text-align:center;}
.grade-select{border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-size:.82rem;outline:none;font-family:inherit;width:100%;background:#f8f8fd;cursor:pointer;}
.grade-select:focus{border-color:var(--indigo);}

/* Yekun xülasə kartı */
.score-card{background:linear-gradient(135deg,#f0eefa,#e8f5e9);border:1px solid #d8d0f5;border-radius:14px;padding:20px;margin-bottom:16px;}
.score-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(0,0,0,.06);}
.score-row:last-child{border:none;margin:0;padding:0;}
.score-label{font-size:.85rem;color:var(--text-dim);}
.score-val{font-size:1.1rem;font-weight:800;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
.score-final{font-size:1.8rem;font-weight:900;}

/* Rüblük qeydlər */
.quarter-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.quarter-item label{display:block;font-size:.78rem;font-weight:700;color:var(--text-dim);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;}
.quarter-item textarea{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px;font-size:.84rem;font-family:inherit;resize:vertical;min-height:80px;outline:none;}
.quarter-item textarea:focus{border-color:var(--indigo);}

/* Status badge */
.status-chip{padding:4px 12px;border-radius:20px;font-size:.75rem;font-weight:700;}
.s-draft{background:#f3f4f6;color:#374151;}
.s-in_progress{background:#dbeafe;color:#1e40af;}
.s-completed{background:#d1fae5;color:#065f46;}
.s-appealed{background:#fee2e2;color:#991b1b;}

.empty-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;color:var(--text-mute);font-size:.9rem;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar"></div>
  <div class="main">
    <div class="topbar">
      <div>
        <h1>📊 Qiymətləndirmə</h1>
        <div class="subtitle">Nazirlər Kabineti Qərar №89 (06.04.2021) — YQ = T×50% + M×40% + ÄI×10%</div>
      </div>
      <button class="btn small" onclick="showNewModal()">+ Yeni qiymətləndirmə</button>
    </div>

    <div class="ev-wrap" id="evWrap">
      <!-- Sol panel: siyahı -->
      <div class="ev-list-panel">
        <div class="ev-list-head">
          📋 Qiymətləndirmələr
          <select id="yearFilter" onchange="loadList()" style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:4px 8px;font-size:.78rem;font-family:inherit;">
          </select>
        </div>
        <div id="evList"><div style="padding:20px;color:var(--text-mute);font-size:.85rem;">Yüklənir...</div></div>
      </div>

      <!-- Sağ panel: forma -->
      <div id="evDetail">
        <div class="empty-panel">
          <div style="font-size:2.5rem;margin-bottom:12px;">📋</div>
          <div>Qiymətləndirmə seçin</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Yeni qiymətləndirmə -->
<div class="modal-bg" id="newModal" style="display:none;">
  <div class="modal">
    <h3>+ Yeni qiymətləndirmə</h3>
    <div class="field">
      <label>İşçi</label>
      <select id="newEmp" required></select>
    </div>
    <div class="field">
      <label>İl</label>
      <select id="newYear">
        <option value="2026">2026</option>
        <option value="2025">2025</option>
        <option value="2024">2024</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="document.getElementById('newModal').style.display='none'">Ləğv et</button>
      <button class="btn" onclick="createEval()">Yarat</button>
    </div>
    <div class="error-msg" id="newErr"></div>
  </div>
</div>

<!-- Tapşırıq əlavə et -->
<div class="modal-bg" id="taskModal" style="display:none;">
  <div class="modal" style="max-width:480px;">
    <h3>📌 Tapşırıq əlavə et</h3>
    <div class="field"><label>Tapşırığın adı</label><input type="text" id="tTitle" placeholder="məs. Aylıq hesabat hazırla"></div>
    <div class="field"><label>İzah</label><textarea id="tDesc" rows="2"></textarea></div>
    <div class="field"><label>Mühümlük dərəcəsi (%)</label><input type="number" id="tPct" min="1" max="100" placeholder="20"></div>
    <div class="field"><label>Son icra tarixi</label><input type="date" id="tDead"></div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="document.getElementById('taskModal').style.display='none'">Ləğv et</button>
      <button class="btn" onclick="addTask()">Əlavə et</button>
    </div>
    <div class="error-msg" id="taskErr"></div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/sidebar.js"></script>
<script>
const user = requireAuth();
let currentEvalId = null;
let evals = [], contacts = [];

const GRADE_LABELS = { 5:'Əla (5)', 4:'Yaxşı (4)', 3:'Kafi (3)', 2:'Qeyri-kafi (2)', 0:'—' };
const GRADE_CLASS  = { 5:'g5', 4:'g4', 3:'g3', 2:'g2', 0:'g0' };
const EVAL_STATUS = { draft:'Qaralama', in_progress:'İcrada', completed:'Tamamlandı', appealed:'Şikayət edilib' };
const EVAL_CLASS  = { draft:'s-draft', in_progress:'s-in_progress', completed:'s-completed', appealed:'s-appealed' };

async function init() {
  const curYear = new Date().getFullYear();
  const ysel = document.getElementById('yearFilter');
  [curYear, curYear-1, curYear-2].forEach(y => ysel.innerHTML += `<option value="${y}">${y}</option>`);

  try { contacts = await apiCall('/employees/contacts'); } catch(e){}
  const empSel = document.getElementById('newEmp');
  contacts.forEach(c => empSel.innerHTML += `<option value="${c.id}">${c.full_name}</option>`);

  await loadList();
}

async function loadList() {
  const year = document.getElementById('yearFilter').value;
  try {
    evals = await apiCall('/evaluations');
    evals = evals.filter(e => String(e.year) === String(year));
  } catch(err) { evals = []; }
  renderList();
}

function renderList() {
  const list = document.getElementById('evList');
  if (!evals.length) {
    list.innerHTML = '<div style="padding:20px;color:var(--text-mute);font-size:.84rem;text-align:center;">Bu il üçün qiymətləndirmə yoxdur</div>';
    return;
  }
  list.innerHTML = evals.map(e => `
    <div class="ev-item ${e.id===currentEvalId?'active':''}" onclick="openEval('${e.id}')">
      <div class="emp">${e.employee?.full_name||'—'}</div>
      <div class="meta">
        ${e.employee?.position||''} ·
        <span class="status-chip ${EVAL_CLASS[e.status]}">${EVAL_STATUS[e.status]}</span>
      </div>
      <div class="meta" style="margin-top:5px;">
        YQ: <b style="color:${e.final_score>=4?'#065f46':e.final_score>=3?'#1e40af':e.final_score>0?'#92400e':'#6b7280'}">
          ${e.final_score > 0 ? e.final_score.toFixed(2) : '—'}
        </b>
      </div>
    </div>`).join('');
}

async function openEval(id) {
  currentEvalId = id;
  renderList();
  const detail = document.getElementById('evDetail');
  detail.innerHTML = '<div class="empty-panel"><div style="font-size:1.5rem;">⏳</div><div>Yüklənir...</div></div>';

  try {
    const ev = await apiCall(`/evaluations/${id}`);
    renderDetail(ev);
  } catch(err) {
    detail.innerHTML = `<div class="empty-panel" style="color:var(--red);">❌ ${err.message}</div>`;
  }
}

function renderDetail(ev) {
  const isAdmin = ['admin','director','deputy'].includes(user.role);
  const scoreColor = ev.final_score >= 4 ? '#065f46' : ev.final_score >= 3 ? '#1e40af' : ev.final_score >= 2 ? '#92400e' : '#6b7280';
  const taskTotal = (ev.tasks||[]).reduce((s,t) => s + Number(t.importance_pct), 0);

  document.getElementById('evDetail').innerHTML = `
    <!-- Başlıq -->
    <div class="ev-section">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;">
        <div>
          <h2 style="font-size:1.2rem;font-weight:800;">${ev.employee?.full_name||'—'}</h2>
          <div style="font-size:.84rem;color:var(--text-dim);">${ev.employee?.position||''} · ${ev.employee?.sectors?.name||''} · ${ev.year}-ci il</div>
          <div style="margin-top:6px;"><span class="status-chip ${EVAL_CLASS[ev.status]}">${EVAL_STATUS[ev.status]}</span></div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          ${isAdmin ? `<select class="status-select" onchange="updateStatus('${ev.id}',this.value)">
            ${Object.entries(EVAL_STATUS).map(([k,v]) => `<option value="${k}" ${ev.status===k?'selected':''}>${v}</option>`).join('')}
          </select>` : ''}
          <button class="btn small" onclick="printPDF('${ev.id}')">📄 PDF</button>
          ${isAdmin ? `<button class="btn small secondary" style="color:var(--red);" onclick="deleteEval('${ev.id}')">🗑</button>` : ''}
        </div>
      </div>
    </div>

    <!-- YQ Xülasə -->
    <div class="score-card">
      <div style="font-size:.78rem;font-weight:700;color:var(--text-dim);margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em;">Yekun Qiymət Hesablaması</div>
      <div class="score-row">
        <span class="score-label">Tapşırıqlar (T) × 50%</span>
        <span class="score-val">${ev.task_score?.toFixed(2)||'0.00'} × 50% = <b>${(ev.task_score * 0.5).toFixed(2)}</b></span>
      </div>
      <div class="score-row">
        <span class="score-label">Meyarlar (M) × 40%</span>
        <span class="score-val">${ev.criteria_score?.toFixed(2)||'0.00'} × 40% = <b>${(ev.criteria_score * 0.4).toFixed(2)}</b></span>
      </div>
      <div class="score-row">
        <span class="score-label">Əmək intizamı (ÄI) × 10%</span>
        <span class="score-val">${ev.discipline_grade||'—'} × 10% = <b>${((ev.discipline_grade||0) * 0.1).toFixed(2)}</b></span>
      </div>
      <div class="score-row" style="margin-top:12px;padding-top:12px;border-top:2px solid rgba(0,0,0,.1);">
        <span style="font-weight:800;font-size:1rem;">YQ = T×50% + M×40% + ÄI×10%</span>
        <span class="score-val score-final" style="color:${scoreColor};">${ev.final_score?.toFixed(2)||'0.00'}</span>
      </div>
      ${ev.final_score > 0 ? `<div style="text-align:center;margin-top:8px;font-size:.84rem;font-weight:700;color:${scoreColor};">
        ${ev.final_score >= 4.5 ? '🏆 Əla' : ev.final_score >= 3.5 ? '✅ Yaxşı' : ev.final_score >= 2.5 ? '⚠️ Kafi' : '❌ Qeyri-kafi'}
      </div>` : ''}
    </div>

    <!-- BÖLMƏ 1: Tapşırıqlar (50%) -->
    <div class="ev-section">
      <div class="ev-section-title">
        <h3>📌 Tapşırıqlar (Hədəflər) <span class="weight-badge">50%</span></h3>
        ${isAdmin ? `<div style="display:flex;gap:8px;align-items:center;">
          <span style="font-size:.78rem;color:${taskTotal===100?'var(--green)':taskTotal>100?'var(--red)':'var(--amber)'};">Cəm: ${taskTotal}%</span>
          <button class="btn small" onclick="document.getElementById('taskModal').style.display='flex'">+ Əlavə et</button>
        </div>` : `<span style="font-size:.78rem;color:var(--text-mute);">Cəm: ${taskTotal}%</span>`}
      </div>
      ${(ev.tasks||[]).length === 0
        ? '<div style="color:var(--text-mute);font-size:.85rem;text-align:center;padding:16px;">Tapşırıq yoxdur. Yanvar ayında əlavə edin.</div>'
        : (ev.tasks||[]).map(t => `
          <div class="ev-row">
            <div>
              <div class="title">${t.title}</div>
              ${t.description ? `<div class="sub">${t.description}</div>` : ''}
              ${t.deadline ? `<div class="sub">Son tarix: ${t.deadline}</div>` : ''}
            </div>
            <div class="pct">${t.importance_pct}%</div>
            <div>
              ${isAdmin ? `<select class="grade-select ${GRADE_CLASS[t.grade||0]}" onchange="gradeTask('${ev.id}','${t.id}',this.value,this)">
                <option value="">—</option>
                <option value="5" ${t.grade===5?'selected':''}>Əla (5)</option>
                <option value="4" ${t.grade===4?'selected':''}>Yaxşı (4)</option>
                <option value="3" ${t.grade===3?'selected':''}>Kafi (3)</option>
                <option value="2" ${t.grade===2?'selected':''}>Qeyri-kafi (2)</option>
              </select>
              <button onclick="deleteTask('${ev.id}','${t.id}')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:.8rem;margin-top:4px;">🗑 sil</button>`
              : `<span class="grade-badge ${GRADE_CLASS[t.grade||0]}">${GRADE_LABELS[t.grade||0]}</span>`}
            </div>
          </div>`).join('')}
    </div>

    <!-- BÖLMƏ 2: Meyarlar (40%) -->
    <div class="ev-section">
      <div class="ev-section-title">
        <h3>🎯 Meyarlar <span class="weight-badge">40%</span></h3>
        <span style="font-size:.78rem;color:var(--text-mute);">Cəm: ${(ev.criteria||[]).reduce((s,c)=>s+Number(c.importance_pct),0)}%</span>
      </div>
      ${(ev.criteria||[]).map(c => `
        <div class="ev-row">
          <div>
            <div class="title">${c.name}</div>
            ${c.is_manager_criterion ? '<div class="sub" style="color:var(--indigo);">Rəhbər meyarı</div>' : ''}
          </div>
          <div class="pct">${c.importance_pct}%</div>
          <div>
            ${isAdmin ? `<select class="grade-select ${GRADE_CLASS[c.grade||0]}" onchange="gradeCrit('${ev.id}','${c.id}',this.value,this)">
              <option value="">—</option>
              <option value="5" ${c.grade===5?'selected':''}>Əla (5)</option>
              <option value="4" ${c.grade===4?'selected':''}>Yaxşı (4)</option>
              <option value="3" ${c.grade===3?'selected':''}>Kafi (3)</option>
              <option value="2" ${c.grade===2?'selected':''}>Qeyri-kafi (2)</option>
            </select>`
            : `<span class="grade-badge ${GRADE_CLASS[c.grade||0]}">${GRADE_LABELS[c.grade||0]}</span>`}
          </div>
        </div>`).join('')}
    </div>

    <!-- BÖLMƏ 3: Əmək intizamı (10%) -->
    <div class="ev-section">
      <div class="ev-section-title">
        <h3>⚖️ Əmək intizamı <span class="weight-badge">10%</span></h3>
      </div>
      <div style="margin-bottom:12px;font-size:.82rem;color:var(--text-dim);">
        <b>Əla (5)</b> — Nizam-intizama ciddi riayət edir, nümunəvidir &nbsp;|&nbsp;
        <b>Yaxşı (4)</b> — Ciddi riayət edir &nbsp;|&nbsp;
        <b>Kafi (3)</b> — Əsasən riayət edir, bəzi pozuntular &nbsp;|&nbsp;
        <b>Qeyri-kafi (2)</b> — Tez-tez pozur
      </div>
      ${isAdmin ? `<div style="display:flex;gap:12px;align-items:center;margin-bottom:12px;">
        <select class="grade-select" style="width:200px;" onchange="updateDiscipline('${ev.id}',this.value)">
          <option value="">— Seçin —</option>
          <option value="5" ${ev.discipline_grade===5?'selected':''}>Əla (5)</option>
          <option value="4" ${ev.discipline_grade===4?'selected':''}>Yaxşı (4)</option>
          <option value="3" ${ev.discipline_grade===3?'selected':''}>Kafi (3)</option>
          <option value="2" ${ev.discipline_grade===2?'selected':''}>Qeyri-kafi (2)</option>
        </select>
      </div>
      <textarea placeholder="Qeydlər (istəyə görə)" rows="2" style="width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px;font-size:.84rem;font-family:inherit;resize:vertical;" onblur="updateDisciplineNotes('${ev.id}',this.value)">${ev.discipline_notes||''}</textarea>`
      : `<div><span class="grade-badge ${GRADE_CLASS[ev.discipline_grade||0]}">${GRADE_LABELS[ev.discipline_grade||0]}</span> ${ev.discipline_notes?`<span style="font-size:.82rem;color:var(--text-dim);margin-left:8px;">${ev.discipline_notes}</span>`:''}</div>`}
    </div>

    <!-- Rüblük qeydlər -->
    <div class="ev-section">
      <div class="ev-section-title">
        <h3>📅 Rüblük qeydlər (3.2)</h3>
      </div>
      <div class="quarter-grid">
        ${['q1','q2','q3','q4'].map((q,i) => {
          const labels = ['I rüb (Mart)', 'II rüb (İyun)', 'III rüb (Sentyabr)', 'IV rüb (Dekabr)'];
          return `<div class="quarter-item">
            <label>${labels[i]}</label>
            <textarea placeholder="Rüb qeydi..." ${!isAdmin?'readonly':''} onblur="updateQuarter('${ev.id}','${q}',this.value)">${ev[q+'_notes']||''}</textarea>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- Müsahibə -->
    <div class="ev-section">
      <div class="ev-section-title">
        <h3>💬 Müsahibə nəticəsi (4.15)</h3>
      </div>
      <div class="field" style="margin-bottom:12px;">
        <label>Rəhbərin qeydi</label>
        <textarea id="iNote" rows="3" ${!isAdmin?'readonly':''} onblur="updateInterview('${ev.id}')" style="width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px;font-size:.84rem;font-family:inherit;resize:vertical;">${ev.interview_notes||''}</textarea>
      </div>
      <div class="field">
        <label>İşçinin rəyi</label>
        <textarea id="iEmp" rows="2" onblur="updateInterview('${ev.id}')" style="width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px;font-size:.84rem;font-family:inherit;resize:vertical;">${ev.employee_comments||''}</textarea>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-top:10px;">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.88rem;">
          <input type="checkbox" ${ev.employee_agrees?'checked':''} onchange="apiCall('/evaluations/${ev.id}','PATCH',{employee_agrees:this.checked})">
          İşçi qiymətləndirmə ilə razıdır
        </label>
      </div>
    </div>
  `;
}

// ─── FUNKSİYALAR ──────────────────────────────────────────
async function showNewModal() { document.getElementById('newModal').style.display='flex'; }

async function createEval() {
  const errEl = document.getElementById('newErr');
  errEl.textContent = '';
  try {
    await apiCall('/evaluations','POST',{
      employee_id: document.getElementById('newEmp').value,
      year: parseInt(document.getElementById('newYear').value)
    });
    document.getElementById('newModal').style.display='none';
    await loadList();
  } catch(err) { errEl.textContent = err.message; }
}

async function gradeTask(evalId, taskId, grade, el) {
  el.className = `grade-select ${GRADE_CLASS[grade||0]}`;
  await apiCall(`/evaluations/${evalId}/tasks/${taskId}`,'PATCH',{ grade: grade ? parseInt(grade) : null });
  const ev = await apiCall(`/evaluations/${evalId}`);
  document.querySelector('.score-card').innerHTML = document.querySelector('.score-card').innerHTML; // refresh
  await loadList();
  openEval(evalId);
}

async function gradeCrit(evalId, critId, grade, el) {
  el.className = `grade-select ${GRADE_CLASS[grade||0]}`;
  await apiCall(`/evaluations/${evalId}/criteria/${critId}`,'PATCH',{ grade: grade ? parseInt(grade) : null });
  await loadList();
  openEval(evalId);
}

async function updateDiscipline(evalId, grade) {
  await apiCall(`/evaluations/${evalId}`,'PATCH',{ discipline_grade: grade ? parseInt(grade) : null });
  await loadList();
  openEval(evalId);
}

async function updateDisciplineNotes(evalId, notes) {
  await apiCall(`/evaluations/${evalId}`,'PATCH',{ discipline_notes: notes });
}

async function updateQuarter(evalId, q, val) {
  await apiCall(`/evaluations/${evalId}`,'PATCH',{ [`${q}_notes`]: val });
}

async function updateInterview(evalId) {
  await apiCall(`/evaluations/${evalId}`,'PATCH',{
    interview_notes: document.getElementById('iNote')?.value || '',
    employee_comments: document.getElementById('iEmp')?.value || ''
  });
}

async function updateStatus(evalId, status) {
  await apiCall(`/evaluations/${evalId}`,'PATCH',{ status });
  await loadList();
}

async function addTask() {
  const errEl = document.getElementById('taskErr');
  errEl.textContent = '';
  try {
    await apiCall(`/evaluations/${currentEvalId}/tasks`,'POST',{
      title: document.getElementById('tTitle').value.trim(),
      description: document.getElementById('tDesc').value.trim(),
      importance_pct: parseFloat(document.getElementById('tPct').value),
      deadline: document.getElementById('tDead').value || null
    });
    document.getElementById('taskModal').style.display='none';
    document.getElementById('tTitle').value=''; document.getElementById('tDesc').value='';
    document.getElementById('tPct').value=''; document.getElementById('tDead').value='';
    openEval(currentEvalId);
  } catch(err) { errEl.textContent = err.message; }
}

async function deleteTask(evalId, taskId) {
  if (!confirm('Tapşırıq silinsin?')) return;
  await apiCall(`/evaluations/${evalId}/tasks/${taskId}`,'DELETE');
  openEval(evalId);
}

async function deleteEval(evalId) {
  if (!confirm('Qiymətləndirmə silinsin?')) return;
  await apiCall(`/evaluations/${evalId}`,'DELETE');
  currentEvalId = null;
  document.getElementById('evDetail').innerHTML = '<div class="empty-panel"><div style="font-size:2.5rem;margin-bottom:12px;">📋</div><div>Qiymətləndirmə seçin</div></div>';
  await loadList();
}

  @media print{

  }
</style>
</head>
<body>
<div class="no-print" style="padding:10px 20px;background:#f0eefa;border-bottom:1px solid #c7cae8;display:flex;justify-content:space-between;align-items:center;">
  <span style="font-weight:700;color:#4f46e5;font-size:12px;">Cmd+P → "PDF olaraq saxla"</span>
  <button onclick="window.print()" style="background:#4f46e5;color:#fff;border:none;padding:7px 18px;border-radius:8px;cursor:pointer;font-weight:700;font-size:11px;">🖨 Çap et</button>
</div>
<div class="header">
  <h1>Dövlət Qulluqçusunun Xidməti Fəaliyyətinin Qiymətləndirilməsi</h1>

  </div>

  ${ev.q1_notes||ev.q2_notes||ev.q3_notes||ev.q4_notes?`
